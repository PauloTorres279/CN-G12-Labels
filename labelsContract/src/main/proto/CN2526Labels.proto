syntax = "proto3";

option java_multiple_files = true;
option java_package = "cn.labels.contract";
option java_outer_classname = "CN2526LabelsProto";

package cn2526labels;

service LabelsService{
    rpc submitImage(stream imageBlock) returns (imageRequestId);
    rpc imageInfo(imageInfoRequest) returns (imageInfoReply);
    rpc namesByDate(namesByDateRequest) returns (namesByDateReply);
}

service ElasticityReply{
    rpc changeInstances(resizeRequest) returns (resizeReply);
    rpc changeInstancesForImages(resizeRequest) returns (resizeReply);
}

message imageBlock{
    string fileName = 1;
    string contentType = 2;
    bytes data = 3;
}

message imageRequestId{
    string requestId = 1;
    string message = 2;
}

message imageInfoRequest{
  string requestId = 1;
}

message LabelInfo{
    string labelEn = 1;
    string labelPt = 2;
    float confidence = 3;
}

message imageInfoReply{
    string requestId = 1;
    string fileName = 2;
    string bucketName = 3;
    string blobName = 4;

    string status = 5;

    string submittedAt = 6;
    string processedAt = 7;

    repeated LabelInfo labels = 8;
    string errorMessage = 9;
}

message namesByDateRequest{
    string label = 1;
    string startDate = 2;
    string endDate = 3;
}

message ImageSummary{
    string requestId = 1;
    string fileName = 2;
    string bucketName = 3;
    string blobName = 4;
    string processedAt = 5;
    repeated LabelInfo labels = 6;
}

message namesByDateReply{
    repeated ImageSummary images = 1;
}

message resizeRequest{
    string projectId = 1;
    string zone = 2;
    string instanceGroupName = 3;
    int32 newSize = 4;
}

message resizeReply{
    bool success = 1;
    string message = 2;
}